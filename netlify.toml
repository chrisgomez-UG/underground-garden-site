# Build settings for Netlify's git/CI integration.
#
# ⚠️ Header and redirect rules do NOT live here — they're in the root
# _headers and _redirects files, which build.py copies into dist/.
# Reason: rules in netlify.toml only apply when Netlify itself runs the
# build from git; a manual deploy of dist/ (drag-and-drop or CLI) never
# reads netlify.toml, and exactly that happened on 2026-07-14 — the site
# shipped with no security headers. Files inside the publish directory
# apply on every deploy type, so that's where the rules live now.
[build]
  command = "python3 build.py"
  publish = "dist"
