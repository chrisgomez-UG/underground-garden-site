[build]
  command = "python3 build.py"
  publish = "dist"

# /index.html and / are the same page — collapse to the canonical root URL
# (matches the canonical tag + sitemap entry build.py writes). force = true
# is required because the file really exists at /index.html.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Baseline security headers for every page and asset.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000"

# CSS/JS are safe to cache forever: every <link>/<script> URL carries a
# content-hash query param (?v=...) from build.py, so any change produces a
# brand-new URL and old cached copies are simply never requested again.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images/video are NOT content-hashed and do get swapped in place in this
# project's workflow (same filename, new file) — cache for a week, not a
# year, so returning visitors pick up replacements reasonably fast.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
